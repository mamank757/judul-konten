name: Update Judul Konten

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Ambil halaman
      run: |
        curl -L https://www.bppbola.my.id/home/judul-konten -o page.html

    - name: Ambil og:description
      run: |
        grep -oP '(?<=<meta property="og:description" content=").*?(?=")' page.html > raw.txt || true
        cat raw.txt

    - name: Pisahkan baris judul
      run: |
        echo "[" > judul.json
        tr '\n' '\n' < raw.txt | awk 'NF{printf "\"%s\",\n",$0}' >> judul.json
        sed -i '$ s/,$//' judul.json
        echo "]" >> judul.json
        cat judul.json

    - name: Commit perubahan
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add judul.json
        git commit -m "update judul otomatis" || echo "tidak ada perubahan"
        git push
