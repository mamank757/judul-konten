name: Update Judul Konten

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Ambil halaman bppbola
      run: |
        curl -L https://www.bppbola.my.id/judul-konten -o page.html

    - name: Ambil meta description
      run: |
        META=$(grep -oP '(?<=<meta property="og:description" content=").*?(?=")' page.html)
        echo "$META" > meta.txt

    - name: Ubah ke JSON
      run: |
        echo "[" > judul.json
        awk 'NF{printf "\"%s\",\n",$0}' meta.txt >> judul.json
        sed -i '$ s/,$//' judul.json
        echo "]" >> judul.json

    - name: Commit perubahan
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add judul.json
        git commit -m "update judul otomatis" || echo "tidak ada perubahan"
        git push
